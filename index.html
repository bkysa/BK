                                            key={o.id}
                                            onClick={() => setSelectedOrderId(o.id)}
                                            className={`w-full text-left p-3 border-b last:border-b-0 transition-colors ${isSelected ? 'bg-indigo-50 border-l-4 border-l-indigo-500' : 'hover:bg-slate-50'}`}
                                        >
                                            <div className={`font-bold text-xs mb-1 ${isSelected ? 'text-indigo-700' : 'text-slate-800'}`}>
                                                {o.itemName}
                                            </div>
                                            <div className="flex items-center justify-between">
                                                <StatusBadge status={o.status} />
                                                {cl.length > 0 && (
                                                    <span className={`text-[9px] font-bold ${checked === cl.length ? 'text-green-600' : 'text-gray-400'}`}>
                                                        {checked}/{cl.length}
                                                    </span>
                                                )}
                                            </div>
                                            {o.deliveryDate && (
                                                <div className="text-[9px] text-red-500 mt-1 font-bold">{o.deliveryDate} 마감</div>
                                            )}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {/* 체크리스트 상세 */}
                        <div className="flex-1 bg-white rounded-xl border shadow-sm flex flex-col overflow-hidden">
                            {!selectedOrder ? (
                                <div className="flex-1 flex items-center justify-center text-gray-400 text-sm p-8 text-center">
                                    <span className="md:hidden">위에서 작업을 선택하세요</span>
                                    <span className="hidden md:inline">좌측에서 작업을 선택하세요</span>
                                </div>
                            ) : (
                                <>
                                    {/* 고정 헤더 */}
                                    <div className="flex-shrink-0 border-b bg-white">
                                        {/* 작업명 + 진행률 */}
                                        <div className="px-4 pt-4 pb-2 flex items-start justify-between gap-2">
                                            <div className="min-w-0">
                                                <h3 className="font-bold text-base text-slate-800 truncate">{selectedOrder.itemName}</h3>
                                                <div className="flex items-center gap-2 mt-1 flex-wrap">
                                                    <StatusBadge status={selectedOrder.status} />
                                                    {selectedOrder.deliveryDate && (
                                                        <span className="text-xs text-red-500 font-bold">{selectedOrder.deliveryDate} 마감</span>
                                                    )}
                                                </div>
                                            </div>
                                            {checklist.length > 0 && (
                                                <div className="flex-shrink-0 text-right">
                                                    <div className="text-xs text-gray-500 font-bold">{checkedCount}/{checklist.length}</div>
                                                    <div className="w-20 h-1.5 bg-gray-200 rounded-full mt-1 overflow-hidden">
                                                        <div 
                                                            className="h-full bg-indigo-500 rounded-full transition-all"
                                                            style={{ width: `${checklist.length ? (checkedCount/checklist.length)*100 : 0}%` }}
                                                        />
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                        {/* 클라이언트 정보 카드 */}
                                        <div className="mx-4 mb-3 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 space-y-1.5">
                                            <div className="flex items-center gap-2 text-xs">
                                                <User size={13} className="text-slate-400 flex-shrink-0" />
                                                <span className="text-slate-500 flex-shrink-0">업체</span>
                                                <span className="font-bold text-slate-700 truncate">{selectedOrder.clientName || <span className="text-gray-300 font-normal">미입력</span>}</span>
                                            </div>
                                            <div className="flex items-center gap-2 text-xs">
                                                <Phone size={13} className="text-slate-400 flex-shrink-0" />
                                                <span className="text-slate-500 flex-shrink-0">연락처</span>
                                                {selectedOrder.clientContact 
                                                    ? <a href={`tel:${selectedOrder.clientContact}`} className="font-bold text-indigo-600 hover:underline truncate">{selectedOrder.clientContact}</a>
                                                    : <span className="text-gray-300">미입력</span>
                                                }
                                            </div>
                                            <div className="flex items-start gap-2 text-xs">
                                                <MapPin size={13} className="text-slate-400 flex-shrink-0 mt-0.5" />
                                                <span className="text-slate-500 flex-shrink-0">주소</span>
                                                {selectedOrder.deliveryAddress 
                                                    ? <a href={`https://map.naver.com/p/search/${encodeURIComponent(selectedOrder.deliveryAddress)}`} target="_blank" className="font-bold text-indigo-600 hover:underline break-all leading-relaxed">{selectedOrder.deliveryAddress}</a>
                                                    : <span className="text-gray-300">미입력</span>
                                                }
                                            </div>
                                        </div>
                                    </div>

                                    {/* 체크 항목 목록 */}
                                    <div className="flex-1 overflow-y-auto p-3 space-y-1 no-scrollbar">
                                        {checklist.length === 0 && (
                                            <div className="text-sm text-gray-400 text-center py-8">
                                                아래에서 체크리스트 항목을 추가하세요
                                            </div>
                                        )}
                                        {sortedChecklist.map((item) => {
                                            const idx = item._origIdx;
                                            const isEditing = editingItemIndex === idx;
                                            return (
                                                <div
                                                    key={item.id || idx}
                                                    className={`flex items-center gap-2 p-2 rounded-lg group transition-colors ${item.checked ? 'bg-green-50' : 'hover:bg-slate-50'}`}
                                                >
                                                    <button
                                                        onClick={() => toggleCheckItem(selectedOrder.id, idx)}
                                                        className={`flex-shrink-0 transition-colors ${item.checked ? 'text-green-500' : 'text-gray-300 hover:text-indigo-500'}`}
                                                    >
                                                        {item.checked
                                                            ? <CheckCircle size={20} />
                                                            : <MinusCircle size={20} className="opacity-30" />
                                                        }
                                                    </button>

                                                    {isEditing ? (
                                                        <input
                                                            ref={editInputRef}
                                                            className="flex-1 text-sm border border-indigo-400 rounded px-2 py-0.5 outline-none focus:ring-2 focus:ring-indigo-300 bg-white"
                                                            value={editingItemText}
                                                            onChange={e => setEditingItemText(e.target.value)}
                                                            onKeyDown={e => {
                                                                if (e.key === 'Enter') handleEditSave();
                                                                if (e.key === 'Escape') { setEditingItemIndex(null); setEditingItemText(''); }
                                                            }}
                                                            onBlur={handleEditSave}
                                                        />
                                                    ) : (
                                                        <span
                                                            className={`flex-1 text-sm cursor-text ${item.checked ? 'line-through text-gray-400' : 'text-slate-700'}`}
                                                            onDoubleClick={() => !item.checked && handleEditStart(idx, item.text)}
                                                            title={item.checked ? '' : '더블클릭하여 수정'}
                                                        >
                                                            {item.text}
                                                        </span>
                                                    )}

                                                    {!isEditing && (
                                                        <div className="flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-all flex-shrink-0">
                                                            {!item.checked && (
                                                                <button
                                                                    onClick={() => handleEditStart(idx, item.text)}
                                                                    className="p-1 text-gray-300 hover:text-indigo-500 rounded"
                                                                >
                                                                    <Edit3 size={13} />
                                                                </button>
                                                            )}
                                                            <button
                                                                onClick={() => deleteCheckItem(selectedOrder.id, idx)}
                                                                className="p-1 text-gray-300 hover:text-red-500 rounded"
                                                            >
                                                                <X size={13} />
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* 항목 추가 */}
                                    <div className="p-3 border-t flex gap-2">
                                        <input
                                            ref={inputRef}
                                            className="flex-1 border rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50"
                                            placeholder="새 항목 추가..."
                                            value={newItemText}
                                            onChange={e => setNewItemText(e.target.value)}
                                            onKeyDown={e => e.key === 'Enter' && handleAddItem()}
                                        />
                                        <button
                                            onClick={handleAddItem}
                                            className="bg-indigo-600 text-white px-3 py-2 rounded-lg font-bold text-sm hover:bg-indigo-700 flex-shrink-0 flex items-center gap-1"
                                        >
                                            <Plus size={16} />
                                        </button>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [schedules, setSchedules] = useState([]); 
            const [workers, setWorkers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isOnline, setIsOnline] = useState(false);
            const [connectionError, setConnectionError] = useState(null);
            
            const [isAuthenticated, setIsAuthenticated] = useState(() => localStorage.getItem('bk_auth') === 'true');
            const [isAdmin, setIsAdmin] = useState(() => localStorage.getItem('bk_role') === 'admin');

            const [currentView, setCurrentView] = useState('dashboard');
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [returnView, setReturnView] = useState('list');
            
            const [urgentCount, setUrgentCount] = useState(0);
            const [showAlertPopup, setShowAlertPopup] = useState(false);
            const [showLogPopup, setShowLogPopup] = useState(false); 

            const [statusPopupOrder, setStatusPopupOrder] = useState(null);
            const [pendingStatus, setPendingStatus] = useState(null);
            
            const [materialPopupData, setMaterialPopupData] = useState(null);
            const [logs, setLogs] = useState([]); 
            const [checklistData, setChecklistData] = useState({}); // { orderId: [{text, checked, id}] }
            
            const hasCheckedFileExpiration = useRef(false);
            const hasSeededWorkers = useRef(false); // 작업자 초기화 체크

            const menuItems = [
                { id: 'dashboard', icon: LayoutDashboard, label: '현황' },
                { id: 'calendar', icon: CalendarIcon, label: '일정' },
                { id: 'checklist', icon: CheckCircle, label: '체크' },
                { id: 'list', icon: FileText, label: '작업' },
                { id: 'materials', icon: Truck, label: '발주' },
            ];

            useEffect(() => {
                // React가 마운트되면 로딩 화면 제거
                const loader = document.getElementById('loading-screen');
                if(loader) loader.style.display = 'none';

                const handlePopState = (e) => {
                    if (currentView === 'detail' || currentView === 'form') {
                        setSelectedOrder(null);
                        setCurrentView(returnView);
                    }
                };

                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [currentView, returnView]);

            const { auth, db, storage, appId } = useMemo(() => {
                try {
                    const app = initializeApp(firebaseConfig);
                    return { auth: getAuth(app), db: getFirestore(app), storage: getStorage(app), appId: firebaseConfig.appId };
                } catch (e) { 
                    return { auth: null, db: null, storage: null, appId: null }; 
                }
            }, []);

            useEffect(() => {
                let unsubAuth = null;
                const init = async () => {
                    if (!auth) { setOrders(MOCK_DATA); setLoading(false); return; }
                    try { await signInAnonymously(auth); } 
                    catch (error) { setConnectionError("인증 실패"); setOrders(MOCK_DATA); setLoading(false); return; }
                    unsubAuth = onAuthStateChanged(auth, (u) => { setUser(u); if (!u) { setOrders(MOCK_DATA); setLoading(false); } });
                };
                init();
                return () => { if (unsubAuth) unsubAuth(); }
            }, [auth]);

            // Data Subscriptions
            useEffect(() => {
                if (!user || !db) return;

                // 1. Orders
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), orderBy('createdAt', 'desc'));
                const unsubOrders = onSnapshot(q, (snap) => {
                    setOrders(snap.docs.map(d => ({ id: d.id, ...d.data() }))); 
                    setIsOnline(true); setLoading(false);
                }, () => { setIsOnline(false); setOrders(MOCK_DATA); setLoading(false); });

                // 2. Schedules
                const sQ = query(collection(db, 'artifacts', appId, 'public', 'data', 'schedules'));
                const unsubSchedules = onSnapshot(sQ, (snap) => {
                    setSchedules(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                // 3. Workers
                const wQ = query(collection(db, 'artifacts', appId, 'public', 'data', 'workers'), orderBy('order', 'asc'));
                const unsubWorkers = onSnapshot(wQ, (snap) => {
                    if (snap.empty && !hasSeededWorkers.current) {
                        // DB가 비어있으면 초기 렌더링 시에는 기본값 사용 (자동 저장은 하지 않음)
                        setWorkers(DEFAULT_WORKERS.map((name, idx) => ({ id: name, name, order: idx }))); 
                    } else {
                        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        // order 필드 없는 문서는 createdAt 기준 정렬
                        docs.sort((a, b) => {
                            if (a.order != null && b.order != null) return a.order - b.order;
                            if (a.order != null) return -1;
                            if (b.order != null) return 1;
                            const ta = a.createdAt?.seconds || 0;
                            const tb = b.createdAt?.seconds || 0;
                            return ta - tb;
                        });
                        setWorkers(docs);
                    }
                    hasSeededWorkers.current = true;
                }, (err) => {
                    // order 필드 인덱스 없는 경우 createdAt으로 폴백
                    const wQFallback = query(collection(db, 'artifacts', appId, 'public', 'data', 'workers'), orderBy('createdAt', 'asc'));
                    onSnapshot(wQFallback, (snap2) => {
                        if (snap2.empty && !hasSeededWorkers.current) {
                            setWorkers(DEFAULT_WORKERS.map((name, idx) => ({ id: name, name, order: idx })));
                        } else {
                            setWorkers(snap2.docs.map(d => ({ id: d.id, ...d.data() })));
                        }
                        hasSeededWorkers.current = true;
                    });
                });

                // 4. Logs
                let unsubLogs = null;
                if (isAdmin) {
                    const logQ = query(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), orderBy('createdAt', 'desc'), limit(50));
                    unsubLogs = onSnapshot(logQ, (snap) => setLogs(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                }

                // 5. Checklists
                const clQ = query(collection(db, 'artifacts', appId, 'public', 'data', 'checklists'));
                const unsubChecklists = onSnapshot(clQ, (snap) => {
                    const data = {};
                    snap.docs.forEach(d => { data[d.id] = d.data().items || []; });
                    setChecklistData(data);
                });

                return () => { unsubOrders(); unsubSchedules(); unsubWorkers(); if(unsubLogs) unsubLogs(); unsubChecklists(); };
            }, [user, db, appId, isAdmin]);

            const addWorker = async (name) => {
                if (!db || !isOnline) return;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'workers'), {
                        name,
                        createdAt: serverTimestamp()
                    });
                } catch (e) { alert("추가 실패: " + e.message); }
            };

            const deleteWorker = async (id) => {
                if (!db || !isOnline) return;
                if (!window.confirm("삭제하시겠습니까?")) return;
                try {
                    // ID가 이름과 같으면(초기값) 실제 문서 ID가 없어서 삭제 불가하므로 경고
                    if (DEFAULT_WORKERS.includes(id) && !workers.some(w => w.id === id && w.createdAt)) {
                        alert("기본 작업자는 DB에 저장되기 전까지 삭제할 수 없습니다. 새 작업자를 추가하면 DB가 활성화됩니다.");
                        return;
                    }
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'workers', id));
                } catch (e) { alert("삭제 실패: " + e.message); }
            };

            const updateWorker = async (id, newName) => {
                if (!db || !isOnline) return;
                try {
                    if (DEFAULT_WORKERS.includes(id) && !workers.some(w => w.id === id && w.createdAt)) {
                        alert("기본 작업자는 DB에 저장되기 전까지 수정할 수 없습니다. 새 작업자를 추가하면 DB가 활성화됩니다.");
                        return;
                    }
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'workers', id), { name: newName });
                } catch (e) { alert("수정 실패: " + e.message); }
            };

            const reorderWorker = async (fromIdx, toIdx) => {
                if (toIdx < 0 || toIdx >= workers.length) return;
                if (!db || !isOnline) return;
                // 로컬에서 순서 변경 후 Firebase의 order 필드 일괄 업데이트
                const reordered = [...workers];
                const [moved] = reordered.splice(fromIdx, 1);
                reordered.splice(toIdx, 0, moved);
                try {
                    await Promise.all(reordered.map((w, idx) => {
                        if (DEFAULT_WORKERS.includes(w.id) && !w.createdAt) return Promise.resolve();
                        return updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'workers', w.id), { order: idx });
                    }));
                    // DB에 저장된 작업자가 없으면 로컬 상태만 업데이트
                    if (reordered.every(w => DEFAULT_WORKERS.includes(w.id) && !w.createdAt)) {
                        // setWorkers는 외부에서 관리되므로 onSnapshot이 없으면 직접 업데이트 안됨
                        // 실제 DB 작업자 있으면 onSnapshot이 자동 업데이트
                    }
                } catch (e) { alert("순서 변경 실패: " + e.message); }
            };

            // Auto Cleanup Logics (File expiration only)
            useEffect(() => {
                if (orders.length > 0 && isOnline && db && storage && !hasCheckedFileExpiration.current) {
                    const checkExpiredFiles = async () => {
                        const now = new Date();
                        const col = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                        for (const order of orders) {
                            if (order.status === '납품완료' && order.completedDate && (order.files && order.files.length > 0)) {
                                const diffTime = Math.abs(now - new Date(order.completedDate));
                                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                                if (diffDays > 7) {
                                    try {
                                        for (const file of order.files) {
                                            if (file.fullPath) await deleteObject(ref(storage, file.fullPath));
                                            else if (file.url) await deleteObject(ref(storage, file.url));
                                        }
                                        await updateDoc(doc(col, order.id), { files: [] });
                                    } catch (err) { console.warn("Cleanup failed", err); }
                                }
                            }
                        }
                    };
                    checkExpiredFiles();
                    hasCheckedFileExpiration.current = true;
                }
            }, [orders, isOnline, db, storage, appId]);

            useEffect(() => {
                const urgent = orders.filter(o => o.deliveryDate && !['납품완료', '작업완료'].includes(o.status) && Math.ceil((new Date(o.deliveryDate) - new Date()) / 86400000) <= 2).length;
                setUrgentCount(urgent);
            }, [orders]);

            const handleLogin = (role) => {
                setIsAuthenticated(true);
                setIsAdmin(role === 'admin');
                localStorage.setItem('bk_auth', 'true');
                localStorage.setItem('bk_role', role);
            };

            const saveOrder = async (data, logInfo = null) => {
                if (!isOnline || !db) return alert("오프라인 상태입니다.");
                try {
                    const col = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                    if (data.id && !data.id.startsWith('mock')) await updateDoc(doc(col, data.id), { ...data, updatedAt: serverTimestamp() });
                    else {
                        const { id, ...rest } = data; 
                        await addDoc(col, { ...rest, displayId: `ORD-24-${Math.floor(100 + Math.random() * 900)}`, createdAt: serverTimestamp(), userId: user?.uid });
                    }
                    if (logInfo && !isAdmin) await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), { ...logInfo, createdAt: serverTimestamp(), userId: user?.uid });
                } catch (e) { alert("저장 실패: " + e.message); }
            };

            const updateSchedule = async (scheduleData) => {
                if (!isOnline || !db) return;
                try {
                    const col = collection(db, 'artifacts', appId, 'public', 'data', 'schedules');
                    if(scheduleData.content.trim() === '') {
                        // 내용이 비면 삭제
                        await deleteDoc(doc(col, scheduleData.id));
                    } else {
                        await updateDoc(doc(col, scheduleData.id), { content: scheduleData.content, updatedAt: serverTimestamp() });
                    }
                } catch(e) { console.error(e); }
            };

            const addSchedule = async (scheduleData) => {
                if (!isOnline || !db) return;
                if (scheduleData.content.trim() === '') return;
                try {
                    const col = collection(db, 'artifacts', appId, 'public', 'data', 'schedules');
                    await addDoc(col, { 
                        worker: scheduleData.worker, 
                        date: scheduleData.date, 
                        content: scheduleData.content, 
                        createdAt: serverTimestamp() 
                    });
                } catch(e) { console.error(e); }
            };

            const saveChecklist = async (orderId, items) => {
                if (!isOnline || !db) {
                    setChecklistData(prev => ({ ...prev, [orderId]: items }));
                    return;
                }
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'checklists', orderId);
                    await setDoc(docRef, { items, updatedAt: serverTimestamp() });
                    setChecklistData(prev => ({ ...prev, [orderId]: items }));
                } catch(e) { console.error("체크리스트 저장 실패", e); }
            };

            const executeStatusChange = async () => {
                if(!statusPopupOrder || !pendingStatus) return;
                const newData = { ...statusPopupOrder, status: pendingStatus };
                if (['납품완료', '납품대기'].includes(pendingStatus) && !statusPopupOrder.completedDate) newData.completedDate = new Date().toISOString().split('T')[0];
                await saveOrder(newData, { type: 'status', msg: `상태 변경: ${statusPopupOrder.status} → ${pendingStatus}` }); 
                setPendingStatus(null); setStatusPopupOrder(null);
            };
            
            const executeMaterialStatusChange = async () => {
                if (!materialPopupData) return;
                const { material, nextStatus } = materialPopupData;
                const order = orders.find(o => o.id === material.orderId);
                if (order) {
                    const updated = order.materials.map(x => x.id === material.id ? { 
                        ...x, 
                        status: nextStatus, 
                        completedAt: nextStatus === '회수완료' ? new Date().toISOString() : (x.completedAt || null) 
                    } : x);
                    await saveOrder({ ...order, materials: updated }, { type: 'material', msg: `자재 변경: ${material.item} (${material.status} → ${nextStatus})` });
                }
                setMaterialPopupData(null);
            };

            const stats = useMemo(() => ({
                ongoing: orders.filter(o => !['납품완료'].includes(o.status)).length,
                pickup: orders.reduce((acc, cur) => acc + (cur.materials || []).filter(m => m.status === '회수대기').length, 0),
                urgent: urgentCount,
                completed: orders.filter(o => ['납품완료'].includes(o.status)).length,
                pendingDelivery: orders.filter(o => o.status === '납품대기').length
            }), [orders, urgentCount]);

            const suppliers = useMemo(() => {
                const s = {};
                orders.forEach(o => (o.materials || []).forEach(m => {
                    if (!s[m.supplier]) s[m.supplier] = [];
                    s[m.supplier].push({ ...m, orderId: o.id, orderName: o.itemName });
                }));
                return s;
            }, [orders]);

            const handleNavigate = (order) => {
                setReturnView(currentView);
                window.history.pushState({ page: 'detail' }, '', '');
                setSelectedOrder(order); setCurrentView('detail'); setShowAlertPopup(false);
            };
            
            if (!isAuthenticated) return <LoginView onLogin={handleLogin} />;
            if (loading) return <div className="flex h-screen items-center justify-center bg-slate-100 flex-col gap-4"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-slate-800"></div><p className="text-slate-500 text-sm animate-pulse">시스템 불러오는 중...</p></div>;

            return (
                <div className="flex flex-col-reverse md:flex-row h-[100dvh] bg-slate-100 font-sans text-slate-800 overflow-hidden">
                    {/* Navigation Bar: 모바일(하단), 데스크탑(좌측) */}
                    <div className="w-full md:w-60 bg-slate-900 text-slate-300 flex flex-row md:flex-col flex-shrink-0 z-20 border-t md:border-t-0 border-slate-700 md:border-none safe-area-bottom">
                        {/* 로고 영역: 모바일에서는 숨김, 데스크탑에서만 표시 */}
                        <div className="hidden md:flex p-4 items-center gap-3 justify-start font-bold text-xl text-white">
                            <div className="bg-white text-slate-900 rounded px-1 flex-shrink-0">BK</div>
                            <span className="text-sm whitespace-nowrap">숨쉬는 깡통</span>
                        </div>
                        
                        {/* 메뉴 버튼 영역 */}
                        <nav className="flex-1 flex flex-row md:flex-col justify-around md:justify-start items-center md:items-stretch p-0 md:p-2 md:space-y-2">
                            {menuItems.map(m => (
                                <button key={m.id} onClick={() => { setCurrentView(m.id); setSelectedOrder(null); }} 
                                    className={`
                                        flex-1 md:flex-none
                                        flex flex-col md:flex-row items-center justify-center md:justify-start
                                        gap-1 md:gap-3
                                        py-3 md:py-3 px-1 md:px-4
                                        rounded-none md:rounded-lg
                                        transition-colors
                                        ${currentView === m.id ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 text-slate-400 hover:text-slate-100'}
                                    `}
                                >
                                    <m.icon size={20} className="mb-0.5 md:mb-0" />
                                    <span className="text-[10px] md:text-sm font-bold md:font-normal">{m.label}</span>
                                </button>
                            ))}
                        </nav>
                        
                        {/* 하단 정보 영역: 모바일에서는 숨김 */}
                        <div className="hidden md:block p-4 text-xs text-slate-500 text-center md:text-left">
                            <div className="font-bold text-slate-300 mb-1">{isAdmin ? 'ADMIN' : 'STAFF'}</div>
                            <div className={`flex items-center gap-1 justify-center md:justify-start ${isOnline ? 'text-green-500' : 'text-red-500'}`}>
                                <Wifi size={10}/> {isOnline ? 'Online' : 'Offline'}
                            </div>
                        </div>
                    </div>

                    <main className="flex-1 flex flex-col overflow-hidden relative bg-slate-100 z-10">
                        <header className="h-14 md:h-16 bg-white border-b flex items-center justify-between px-4 md:px-6 shadow-sm flex-shrink-0 relative">
                            <h2 className="font-bold text-lg md:text-xl uppercase text-slate-800">
                                {currentView === 'dashboard' && '현황'}
                                {currentView === 'calendar' && '일정'}
                                {currentView === 'list' && '작업'}
                                {currentView === 'materials' && '발주'}
                                {currentView === 'checklist' && '체크리스트'}
                                {currentView === 'detail' && '작업 상세'}
                                {currentView === 'form' && (selectedOrder ? '작업 수정' : '새 작업 등록')}
                            </h2>
                            <div className="flex items-center gap-3">
                                {/* 모바일에서만 보이는 상태 표시기 (온라인/오프라인) */}
                                <div className={`md:hidden flex items-center gap-1 text-[10px] ${isOnline ? 'text-green-500' : 'text-red-500'}`}>
                                    <Wifi size={14}/>
                                </div>

                                {isAdmin && (
                                    <button onClick={()=>setShowLogPopup(!showLogPopup)} className="p-2 bg-yellow-100 text-yellow-600 hover:bg-yellow-200 rounded-full relative shadow-sm">
                                        <ShieldAlert size={20} />
                                        {logs.length > 0 && <span className="absolute top-0 right-0 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>}
                                    </button>
                                )}
                                <div className="relative">
                                    <button onClick={()=>setShowAlertPopup(!showAlertPopup)} className="p-2 hover:bg-slate-100 rounded-full relative"><Bell className="text-slate-600" /></button>
                                </div>
                            </div>
                        </header>

                        <div className="h-full overflow-y-auto p-4 md:p-6 scroll-touch">
                            <div className={`max-w-5xl mx-auto ${['calendar', 'materials', 'detail'].includes(currentView) ? 'h-full' : ''}`}>
                                {currentView === 'dashboard' && <Dashboard orders={orders} stats={stats} suppliers={suppliers} onNavigate={handleNavigate} onStatusClick={setStatusPopupOrder} />}
                                {currentView === 'calendar' && (
                                    <CalendarView 
                                        orders={orders} 
                                        onSelect={handleNavigate} 
                                        scheduleData={schedules} 
                                        onUpdateSchedule={updateSchedule} 
                                        onAddSchedule={addSchedule} 
                                        workers={workers}
                                        onAddWorker={addWorker}
                                        onDeleteWorker={deleteWorker}
                                        onUpdateWorker={updateWorker}
                                        onReorderWorker={reorderWorker}
                                    />
                                )}
                                {currentView === 'list' && !selectedOrder && <ListView orders={orders} onSelect={handleNavigate} onAdd={() => { setReturnView('list'); window.history.pushState({ page: 'form' }, '', ''); setSelectedOrder(null); setCurrentView('form'); }} onStatusClick={setStatusPopupOrder} />}
                                {currentView === 'detail' && <DetailView order={selectedOrder} onBack={() => window.history.back()} onUpdate={(data, logInfo, navigate, msg) => { if(data === null && logInfo === 'form') { window.history.pushState({ page: 'form' }, '', ''); setCurrentView('form'); } else { saveOrder(data, msg); } }} isAdmin={isAdmin} currentUserId={user?.uid} onStatusClick={setStatusPopupOrder} onMaterialStatusClick={(m, next)=>setMaterialPopupData({material:m, nextStatus:next})} />}
                                {currentView === 'form' && <FormView order={selectedOrder} storage={storage} onSave={(data, logInfo) => { saveOrder(data, logInfo); window.history.back(); }} onDelete={async (id) => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id)); window.history.back(); }} onCancel={() => window.history.back()} isAdmin={isAdmin} currentUserId={user?.uid} />}
                                {currentView === 'materials' && <MaterialManageView suppliers={suppliers} orders={orders} onUpdateOrder={saveOrder} onMaterialStatusClick={(m, next)=>setMaterialPopupData({material:m, nextStatus:next})} />}
                                {currentView === 'checklist' && <ChecklistView orders={orders} onNavigate={handleNavigate} onSaveChecklist={saveChecklist} checklistData={checklistData} />}
                            </div>
                        </div>

                        {statusPopupOrder && !pendingStatus && (
                            <ModalOverlay onClose={() => setStatusPopupOrder(null)}>
                                <div className="bg-white w-full max-w-xs rounded-xl shadow-2xl p-4 animate-fade-in" onClick={e=>e.stopPropagation()}>
                                    <h3 className="font-bold text-center mb-4 text-lg">상태 변경</h3>
                                    <div className="grid gap-2">
                                        {['설계중', '자재발주중', '작업중', '작업완료', '도장/마감중', '납품대기', '납품완료'].map(st => (
                                            <button key={st} onClick={() => setPendingStatus(st)} className={`py-3 rounded-lg font-bold text-sm transition-colors ${statusPopupOrder.status === st ? 'bg-slate-800 text-white' : 'bg-slate-50 hover:bg-slate-100 text-slate-700'}`}>{st}</button>
                                        ))}
                                    </div>
                                </div>
                            </ModalOverlay>
                        )}

                        {pendingStatus && (
                            <ModalOverlay onClose={() => setPendingStatus(null)}>
                                <div className="bg-white w-full max-w-xs rounded-xl shadow-2xl p-6 animate-fade-in text-center" onClick={e=>e.stopPropagation()}>
                                    <h3 className="font-bold text-lg mb-2">상태를 변경할까요?</h3>
                                    <div className="flex gap-2 mt-4">
                                        <button onClick={() => setPendingStatus(null)} className="flex-1 bg-gray-200 py-3 rounded-xl font-bold text-gray-600">취소</button>
                                        <button onClick={executeStatusChange} className="flex-1 bg-indigo-600 py-3 rounded-xl font-bold text-white shadow-lg">확인</button>
                                    </div>
                                </div>
                            </ModalOverlay>
                        )}
                        
                        {materialPopupData && (
                            <ModalOverlay onClose={() => setMaterialPopupData(null)}>
                                <div className="bg-white w-full max-w-xs rounded-xl shadow-2xl p-6 animate-fade-in text-center" onClick={e=>e.stopPropagation()}>
                                    <h3 className="font-bold text-lg mb-4">자재 상태 변경</h3>
                                    <div className="grid grid-cols-2 gap-2 mb-4">
                                        {['발주', '접수', '배차', '회수대기', '회수완료'].map((status) => (
                                            <button key={status} onClick={() => setMaterialPopupData({ ...materialPopupData, nextStatus: status })} className={`py-2 rounded text-xs font-bold border transition-all ${materialPopupData.nextStatus === status ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>{status}</button>
                                        ))}
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setMaterialPopupData(null)} className="flex-1 bg-gray-200 py-2 rounded font-bold text-gray-600 text-xs">취소</button>
                                        <button onClick={executeMaterialStatusChange} className="flex-1 bg-indigo-600 py-2 rounded font-bold text-white shadow-lg text-xs">변경하기</button>
                                    </div>
                                </div>
                            </ModalOverlay>
                        )}
                        
                         {/* Log Popup */}
                        {showLogPopup && isAdmin && (
                            <ModalOverlay onClose={() => setShowLogPopup(false)}>
                                <div className="bg-white w-full max-w-sm rounded-xl shadow-2xl overflow-hidden animate-fade-in" onClick={e=>e.stopPropagation()}>
                                    <div className="bg-yellow-50 p-3 border-b border-yellow-100 flex justify-between items-center">
                                        <h4 className="font-bold text-sm flex items-center gap-2 text-yellow-800"><History size={16}/> 스태프 활동 기록</h4>
                                        <button onClick={()=>setShowLogPopup(false)}><X size={16} className="text-yellow-600"/></button>
                                    </div>
                                    <div className="max-h-[60vh] overflow-y-auto scroll-touch p-2 space-y-1">
                                        {logs.length === 0 && <div className="text-xs text-gray-400 text-center py-8">기록이 없습니다.</div>}
                                        {logs.map(log => (
                                            <div key={log.id} className="text-xs p-3 hover:bg-slate-50 rounded border-b last:border-0">
                                                <div className="flex justify-between items-start mb-1">
                                                    <span className={`font-bold px-2 py-0.5 rounded text-[10px] text-white ${log.type === 'create' ? 'bg-blue-500' : log.type === 'status' ? 'bg-green-500' : 'bg-orange-500'}`}>{log.type}</span>
                                                    <span className="text-gray-400 text-[10px]">{formatTime(log.createdAt)}</span>
                                                </div>
                                                <div className="font-bold text-slate-700 mb-1 text-sm">{log.orderName}</div>
                                                <div className="text-gray-600">{log.message}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </ModalOverlay>
                        )}
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
