        /* 기본 폰트 및 스크롤 동작 최적화 */

            height: 20px;

    <script>
        window.onerror = function(msg, url, line, col, error) {
            const errorBox = document.getElementById('error-display');
            if (errorBox) {
                errorBox.style.display = 'block';
                errorBox.innerHTML += `<div style="margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:10px;">
                    <h3>⚠️ 시스템 오류 발생</h3>

            return false;

        const getDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                        Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        };

        const getMockCoordinates = (address) => {

        const StatusBadge = ({ status, onClick }) => {

            };

            return (

                    <Card className="w-full max-w-md p-8 space-y-6 shadow-xl">

                        <form onSubmit={handleSubmit} className="space-y-4">

                                <input 
                                    type="password" 
                                    value={code}

                                    className="w-full text-center text-2xl tracking-widest p-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all"

                    </Card>

            );
        };

        const Dashboard = ({ orders, stats, suppliers, onNavigate, onStatusClick }) => {
            const [activeStat, setActiveStat] = useState(null);
            const [activeRoutePopup, setActiveRoutePopup] = useState(null);

            // 동선 최적화 로직
            const optimizedRoute = useMemo(() => {
                const pickupTargets = Object.keys(suppliers).filter(name => 
                    suppliers[name].some(m => ['회수대기', '접수'].includes(m.status))
                );

                if (pickupTargets.length === 0) return [];

                let currentLoc = { lat: COMPANY_INFO.lat, lng: COMPANY_INFO.lng, name: 'start' };
                
                let unvisited = pickupTargets.map(name => {
                    const materials = suppliers[name];
                    const customInfo = materials[0]?.supplierInfo || {};
                    const baseInfo = BASE_SUPPLIER_INFO[name] || {};
                    
                    const lat = customInfo.lat || baseInfo.lat || 37.55; 
                    const lng = customInfo.lng || baseInfo.lng || 127.0;
                    const address = customInfo.address || baseInfo.address || '주소 미상';

                    return {
                        name,
                        lat,
                        lng,
                        address,
                        count: materials.filter(m => ['회수대기', '접수'].includes(m.status)).length
                    };
                });

                const route = [];
                while (unvisited.length > 0) {
                    let nearest = null;
                    let minDist = Infinity;
                    let nearestIdx = -1;
                    unvisited.forEach((node, idx) => {
                        const dist = getDistance(currentLoc.lat, currentLoc.lng, node.lat, node.lng);
                        if (dist < minDist) {
                            minDist = dist;
                            nearest = node;
                            nearestIdx = idx;
                        }
                    });
                    if (nearest) {
                        route.push(nearest);
                        currentLoc = nearest; 
                        unvisited.splice(nearestIdx, 1);
                    } else {
                        break;
                    }
                }
                return route;
            }, [suppliers]);

            const statList = useMemo(() => {
                if (!activeStat) return [];
                if (activeStat === 'pickup') {
                    const list = [];
                    orders.forEach(o => (o.materials || []).forEach(m => {
                        if (m.status === '회수대기') {
                            list.push({ ...m, orderName: o.itemName, orderId: o.id, type: 'material' });
                        }
                    }));
                    return list;
                }
                
                const priority = {
                    '작업중': 1,
                    '작업완료': 2,
                    '도장/마감중': 3,
                    '납품대기': 4,
                    '자재발주중': 5,
                    '설계중': 6
                };

                return orders
                    .filter(o => {
                        if (activeStat === 'ongoing') {
                            return !['납품완료'].includes(o.status) && o.itemName !== '기타 자재 발주';
                        }
                        if (activeStat === 'urgent') {
                            if (!o.deliveryDate || ['납품완료', '작업완료'].includes(o.status)) return false;
                            return Math.ceil((new Date(o.deliveryDate) - new Date()) / 86400000) <= 2;
                        }
                        if (activeStat === 'pendingDelivery') {
                            return o.status === '납품대기';
                        }
                        return false;
                    })
                    .sort((a, b) => {
                        if (activeStat === 'ongoing') {
                            const pa = priority[a.status] || 99;
                            const pb = priority[b.status] || 99;
                            return pa - pb;
                        }
                        return 0;
                    });
            }, [activeStat, orders]);

            return (

                            </Card>

                                <div className="text-xs text-gray-500">마감 임박</div>
                                <div className="text-2xl font-bold text-red-600">{stats.urgent}건</div>
                            </Card>
                            <Card className="p-4 border-l-4 border-teal-500 cursor-pointer hover:bg-teal-50" onClick={()=>setActiveStat('pendingDelivery')}>
                                <div className="text-xs text-gray-500">납품 대기</div>
                                <div className="text-2xl font-bold text-teal-600">{stats.pendingDelivery}건</div>

                                <Card key={o.id} className="p-4 flex justify-between items-center hover:border-blue-400">
                                    <div className="flex-1 cursor-pointer" onClick={() => onNavigate(o)}>
                                        <div className="flex items-center gap-2 mb-1">

                    {/* Stat Modal */}
                    {activeStat && (
                        <ModalOverlay onClose={()=>setActiveStat(null)}>
                            <div className="bg-white w-full max-w-md rounded-xl shadow-2xl p-4 max-h-[80vh] overflow-y-auto scroll-touch" onClick={e=>e.stopPropagation()}>
                                <div className="flex justify-between mb-4">
                                    <h3 className="font-bold text-lg">상세 내역 ({statList.length})</h3>
                                    <button onClick={()=>setActiveStat(null)}><X size={20}/></button>
                                </div>
                                <div className="space-y-2">
                                    {statList.length === 0 && <div className="text-gray-400">내역이 없습니다.</div>}
                                    {statList.map((item, i) => (
                                        <div key={i} className="border p-3 rounded hover:bg-slate-50 flex justify-between items-center" >
                                            <div className="cursor-pointer flex-1" onClick={()=>{

                    {/* Route Modal */}
                    {activeRoutePopup && (
                        <ModalOverlay onClose={()=>setActiveRoutePopup(null)}>
                            <div className="bg-white w-full max-w-sm rounded-xl p-4" onClick={e=>e.stopPropagation()}>

                                <div className="text-sm text-gray-500 mb-4">{activeRoutePopup.address}</div>
                                <div className="space-y-2 mb-4">
                                    {(suppliers[activeRoutePopup.name] || []).filter(m=>['회수대기', '접수'].includes(m.status)).map((item, i)=>(
                                        <div key={i} className="bg-slate-50 p-2 rounded text-sm flex justify-between items-center">
                                            <div className="flex items-center gap-2">
                                                <span className={`text-[10px] px-1.5 py-0.5 rounded text-white ${item.status === '접수' ? 'bg-orange-500' : 'bg-indigo-500'}`}>{item.status}</span>
                                                <span>{item.item}</span>
                                            </div>
                                            <span className="font-bold">{item.quantity}</span>
                                        </div>
                                    ))}
                                </div>
                                <a href={`https://map.naver.com/p/search/${activeRoutePopup.address}`} target="_blank" className="w-full bg-[#03C75A] text-white flex items-center justify-center gap-2 py-3 rounded font-bold mb-2 hover:opacity-90">
                                    <Navigation size={18}/> 네이버 지도 보기
                                </a>
                                <button onClick={()=>setActiveRoutePopup(null)} className="w-full bg-slate-100 text-slate-600 py-3 rounded font-bold">닫기</button>
                            </div>
                        </ModalOverlay>
                    )}
                </>
            );
        };

        const ListView = ({ orders, onSelect, onAdd, onStatusClick }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [open, setOpen] = useState({ design: true, prod: true, done: false });
            const groups = { design: [], prod: [], done: [] };
            
            orders
                .filter(o => (o.itemName || '').toLowerCase().includes(searchTerm.toLowerCase()))
                .filter(o => o.itemName !== '기타 자재 발주') 
                .forEach(o => {
                    if (['설계중', '대기', '자재발주중'].includes(o.status)) groups.design.push(o);
                    else if (['작업중', '작업완료', '도장/마감중'].includes(o.status)) groups.prod.push(o);
                    else groups.done.push(o);
                });

            const Section = ({ id, title, items }) => (
                <div className="mb-4">
                <div onClick={() => setOpen({ ...open, [id]: !open[id] })} className={`flex justify-between p-3 rounded cursor-pointer transition-colors ${open[id] ? 'bg-slate-800 text-white' : 'bg-white border hover:bg-slate-50'}`}>
                    <span className="font-bold">{title} ({items.length})</span>{open[id] ? <ChevronUp size={18} /> : <ChevronDown size={18} />}
                </div>
                {open[id] && <div className="mt-2 pl-2 border-l-2 border-slate-200 space-y-2">
                    {items.map(o => (
                    <Card key={o.id} className="p-3 bg-white transition-colors hover:border-blue-500 flex justify-between items-center">
                        <div className="flex-1 cursor-pointer" onClick={() => onSelect(o)}>
                            <div className="font-bold truncate mr-2 mb-1">{o.itemName}</div>
                            <div className="text-xs text-gray-500 flex gap-2">
                                <span>{o.clientName}</span>
                                <span className="text-gray-300">|</span>
                                <span>{o.deliveryDate} 납품</span>
                            </div>
                        </div>
                        <StatusBadge status={o.status} onClick={() => onStatusClick(o)} />
                    </Card>
                    ))}
                    {items.length === 0 && <div className="text-sm text-gray-400 p-2">항목 없음</div>}
                </div>}
                </div>
            );

            return (
                <div className="space-y-4 animate-fade-in pb-10">
                <div className="flex gap-2 bg-white p-3 rounded-xl border shadow-sm sticky top-0 z-10">
                    <Search size={20} className="text-gray-400"/>
                    <input 
                    className="flex-1 outline-none bg-transparent min-w-0" 
                    placeholder="작업명 검색..." 
                    value={searchTerm} 
                    onChange={e => setSearchTerm(e.target.value)} 
                    />
                    <button onClick={onAdd} className="bg-slate-800 text-white px-3 py-1 rounded text-sm font-bold flex items-center gap-1 flex-shrink-0">
                    <Plus size={16} /> <span className="hidden sm:inline">작업등록</span>
                    </button>
                </div>
                <Section id="design" title="설계/발주 단계" items={groups.design} />
                <Section id="prod" title="제작/마감 단계" items={groups.prod} />
                <Section id="done" title="납품 대기/완료" items={groups.done} />
                </div>
            );
        };

        const CalendarView = ({ orders, onSelect, scheduleData, onUpdateSchedule, onAddSchedule, workers, onAddWorker, onDeleteWorker, onUpdateWorker, onReorderWorker }) => {
            const [viewMode, setViewMode] = useState('delivery'); // 'delivery' | 'worker' | 'material_weekly'
            const [date, setDate] = useState(new Date());
            const [scheduleModal, setScheduleModal] = useState(null); // { worker, date, content, id }
            const [isEditingSchedule, setIsEditingSchedule] = useState(false);
            
            // 작업자 관리 모달 상태
            const [manageWorkersModal, setManageWorkersModal] = useState(false);
            const [newWorkerName, setNewWorkerName] = useState('');
            const [editingWorkerId, setEditingWorkerId] = useState(null);
            const [editingWorkerName, setEditingWorkerName] = useState('');
            const [mobileSelectedDay, setMobileSelectedDay] = useState(() => {
                const today = new Date();
                return today.getDay() === 0 ? 6 : today.getDay() - 1; // 0=월 ~ 6=일
            });

            useEffect(() => {
                if (!scheduleModal) setIsEditingSchedule(false);
            }, [scheduleModal]);

                const days = [];
            const year = date.getFullYear();
            const month = date.getMonth();
            
            let firstDayIndex = new Date(year, month, 1).getDay();
            firstDayIndex = firstDayIndex === 0 ? 6 : firstDayIndex - 1; 
            
            const lastDate = new Date(year, month + 1, 0).getDate();
            
            for (let i = 0; i < firstDayIndex; i++) days.push(null);
            for (let i = 1; i <= lastDate; i++) days.push(new Date(year, month, i));

                const getWeekDates = (baseDate) => {
                const current = new Date(baseDate);
                const day = current.getDay();
                const diff = current.getDate() - day + (day === 0 ? -6 : 1); // Monday based
                const monday = new Date(current.setDate(diff));
                const week = [];
                for(let i=0; i<7; i++) {
                    const d = new Date(monday);
                    d.setDate(monday.getDate() + i);
                    week.push(d);
                }
                return week;
            };

            const weekDates = getWeekDates(date);
            const weekStr = `${weekDates[0].getMonth()+1}.${weekDates[0].getDate()} - ${weekDates[6].getMonth()+1}.${weekDates[6].getDate()}`;

            const getLocalDateString = (d) => {
                if (!d) return null;
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const da = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${da}`;
            };

            const handleScheduleClick = (worker, dateStr, existingSchedule) => {
                setScheduleModal({
                    worker,
                    date: dateStr,
                    content: existingSchedule ? existingSchedule.content : '',
                    id: existingSchedule ? existingSchedule.id : null
                });
            };

            const saveSchedule = () => {
                if(scheduleModal) {
                    if(scheduleModal.id) {
                        onUpdateSchedule(scheduleModal);
                    } else {
                        onAddSchedule(scheduleModal);
                    }
                    setScheduleModal(null);
                }
            };

            const getMaterialsForDate = (dateStr) => {
                const list = [];
                orders.forEach(o => {
                    (o.materials || []).forEach(m => {
                        if (m.date === dateStr && m.status !== '정보') {
                            list.push({ ...m, orderName: o.itemName });
                        }
                    });
                });
                return list;
            };

            return (
                <div className="h-full flex flex-col animate-fade-in pb-10 min-h-0">
                    <div className="flex justify-between items-center mb-4 flex-shrink-0">
                        <div className="flex bg-slate-200 p-1 rounded-lg">
                            <button onClick={()=>setViewMode('delivery')} className={`px-2 py-1 text-[10px] md:text-xs font-bold rounded ${viewMode==='delivery'?'bg-white shadow text-indigo-900':'text-gray-500'}`}>마감(월간)</button>
                            <button onClick={()=>setViewMode('worker')} className={`px-2 py-1 text-[10px] md:text-xs font-bold rounded ${viewMode==='worker'?'bg-white shadow text-indigo-900':'text-gray-500'}`}>작업(주간)</button>
                            <button onClick={()=>setViewMode('material_weekly')} className={`px-2 py-1 text-[10px] md:text-xs font-bold rounded ${viewMode==='material_weekly'?'bg-white shadow text-indigo-900':'text-gray-500'}`}>발주(주간)</button>
                        </div>
                        <div className="flex gap-2 items-center">
                            <h2 className="text-sm md:text-lg font-bold whitespace-nowrap">
                                {viewMode === 'delivery' ? `${year}.${month + 1}` : weekStr}
                            </h2>
                            <div className="flex rounded border bg-white">
                                <button onClick={() => {
                                    const newDate = new Date(date);
                                    if(viewMode==='delivery') newDate.setMonth(month - 1);
                                    else newDate.setDate(newDate.getDate() - 7);
                                    setDate(newDate);
                                }} className="p-1 hover:bg-slate-50 border-r"><ChevronLeft size={16}/></button>
                                <button onClick={() => setDate(new Date())} className="text-xs px-2 hover:bg-slate-50 font-bold whitespace-nowrap">오늘</button>
                                <button onClick={() => {
                                    const newDate = new Date(date);
                                    if(viewMode==='delivery') newDate.setMonth(month + 1);
                                    else newDate.setDate(newDate.getDate() + 7);
                                    setDate(newDate);
                                }} className="p-1 hover:bg-slate-50 border-l"><ChevronRight size={16}/></button>
                            </div>
                        </div>
                    </div>

                    {viewMode === 'delivery' ? (
                        <div className="flex-1 bg-white border rounded-xl overflow-hidden flex flex-col shadow-sm min-h-0">
                            <div className="grid grid-cols-7 bg-slate-50 border-b text-center py-2 font-bold text-slate-600 text-sm flex-shrink-0">
                            <div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div className="text-blue-500">토</div><div className="text-red-500">일</div>
                            </div>
                            <div className="flex-1 grid grid-cols-7 grid-rows-5 overflow-y-auto">
                            {days.map((d, i) => {
                                if (!d) return <div key={i} className="bg-slate-50 border-r border-b"></div>;
                                const dateStr = getLocalDateString(d);
                                
                                const events = orders.filter(o => {
                                    let targetDate = o.deliveryDate;
                                    if (o.status === '납품완료' && o.completedDate) {
                                        targetDate = o.completedDate;
                                    }
                                    return targetDate === dateStr;
                                });
                                
                                const isToday = dateStr === getLocalDateString(new Date());
                                return (
                                <div key={i} className={`border-r border-b p-1 bg-white min-h-[60px] flex flex-col ${isToday ? 'bg-blue-50' : ''}`}>
                                    <div className={`text-xs font-bold mb-1 text-center ${isToday ? 'text-blue-600' : 'text-gray-500'}`}>{d.getDate()}</div>
                                    <div className="space-y-1 overflow-y-auto flex-1 no-scrollbar">
                                    {events.map(ev => {
                                        const isDone = ['납품완료'].includes(ev.status);
                                        return (
                                        <div key={ev.id} onClick={() => onSelect(ev)} className={`text-[10px] p-1 truncate cursor-pointer rounded hover:opacity-80 ${isDone ? 'bg-slate-100 text-slate-500 border-l-2 border-slate-400 line-through' : 'bg-red-50 text-red-800 border-l-2 border-red-500'}`}>
                                        {ev.itemName}
                                        </div>
                                    )})}
                                    </div>
                                </div>
                                )
                            })}
                            </div>
                        </div>
                    ) : viewMode === 'worker' ? (
                        <div className="flex-1 bg-white border rounded-xl overflow-hidden flex flex-col shadow-sm min-h-0 relative">

                            {/* ── 데스크탑: 기존 8열 그리드 ── */}
                            <div className="hidden md:flex flex-col flex-1 min-h-0">
                                <div className="absolute top-2 right-2 z-10">
                                    <button onClick={()=>setManageWorkersModal(true)} className="bg-white border text-gray-600 px-2 py-1 rounded text-xs font-bold shadow hover:bg-slate-50 flex items-center gap-1">
                                        <Settings size={12}/> 작업자 관리
                                    </button>
                                </div>
                                <div className="grid grid-cols-[80px_1fr_1fr_1fr_1fr_1fr_1fr_1fr] bg-slate-100 border-b flex-shrink-0 mt-8">
                                    <div className="p-2 text-center font-bold text-xs flex items-center justify-center bg-slate-200">이름</div>
                                    {weekDates.map((d, i) => {
                                        const isToday = getLocalDateString(d) === getLocalDateString(new Date());
                                        return (
                                            <div key={i} className={`p-2 text-center border-l text-xs font-bold flex flex-col ${isToday ? 'bg-indigo-50 text-indigo-700' : ''}`}>
                                                <span className={`${i===5?'text-blue-500':i===6?'text-red-500':''}`}>{['월','화','수','목','금','토','일'][i]}</span>
                                                <span className="text-[10px] text-gray-500">{d.getDate()}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="flex-1 overflow-y-auto">
                                    {workers.map(worker => (
                                        <div key={worker.id || worker.name} className="grid grid-cols-[80px_1fr_1fr_1fr_1fr_1fr_1fr_1fr] border-b min-h-[80px]">
                                            <div className="p-2 bg-slate-50 font-bold text-xs flex items-center justify-center border-r">
                                                {worker.name}
                                            </div>
                                            {weekDates.map((d, i) => {
                                                const dateStr = getLocalDateString(d);
                                                const schedules = scheduleData.filter(s => s.worker === worker.name && s.date === dateStr);
                                                return (
                                                    <div
                                                        key={i}
                                                        onClick={() => handleScheduleClick(worker.name, dateStr, schedules[0])}
                                                        className="border-l p-1 hover:bg-indigo-50 cursor-pointer relative group transition-colors"
                                                    >
                                                        {schedules.length > 0 ? (
                                                            schedules.map(s => (
                                                                <div key={s.id} className="bg-indigo-100 text-indigo-800 p-1 rounded text-[10px] font-bold whitespace-pre-wrap break-words border border-indigo-200 shadow-sm h-full">
                                                                    {s.content}
                                                                </div>
                                                            ))
                                                        ) : (
                                                            <div className="h-full w-full flex items-center justify-center opacity-0 group-hover:opacity-100">
                                                                <Plus size={14} className="text-gray-300"/>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    ))}
                                    {workers.length === 0 && <div className="p-8 text-center text-gray-400 text-sm">등록된 작업자가 없습니다. [작업자 관리]에서 추가해주세요.</div>}
                                </div>
                            </div>

                            {/* ── 모바일: 요일 탭 + 카드 리스트 ── */}
                            <div className="flex md:hidden flex-col flex-1 min-h-0">
                                {/* 상단: 작업자 관리 버튼 */}
                                <div className="flex justify-end p-2 border-b flex-shrink-0">
                                    <button onClick={()=>setManageWorkersModal(true)} className="bg-white border text-gray-600 px-2 py-1.5 rounded text-xs font-bold shadow hover:bg-slate-50 flex items-center gap-1">
                                        <Settings size={12}/> 작업자 관리
                                    </button>
                                </div>
                                {/* 요일 탭 */}
                                <div className="grid grid-cols-7 border-b flex-shrink-0 bg-slate-50">
                                    {weekDates.map((d, i) => {
                                        const isToday = getLocalDateString(d) === getLocalDateString(new Date());
                                        const isSelected = mobileSelectedDay === i;
                                        return (
                                            <button
                                                key={i}
                                                onClick={() => setMobileSelectedDay(i)}
                                                className={`py-2 flex flex-col items-center transition-colors border-b-2 ${isSelected ? 'border-indigo-500 bg-white' : 'border-transparent'}`}
                                            >
                                                <span className={`text-[10px] font-bold ${i===5?'text-blue-500':i===6?'text-red-500':isToday?'text-indigo-600':'text-slate-500'}`}>
                                                    {['월','화','수','목','금','토','일'][i]}
                                                </span>
                                                <span className={`text-sm font-bold ${isToday ? 'bg-indigo-600 text-white rounded-full w-6 h-6 flex items-center justify-center' : isSelected ? 'text-indigo-600' : 'text-slate-700'}`}>
                                                    {d.getDate()}
                                                </span>
                                            </button>
                                        );
                                    })}
                                </div>
                                {/* 선택 날의 작업자별 일정 카드 */}
                                <div className="flex-1 overflow-y-auto p-3 space-y-2 no-scrollbar">
                                    {(() => {
                                        const selectedDate = getLocalDateString(weekDates[mobileSelectedDay]);
                                        const hasAny = workers.some(w => scheduleData.some(s => s.worker === w.name && s.date === selectedDate));
                                        if (workers.length === 0) return <div className="text-center text-gray-400 text-sm py-8">등록된 작업자가 없습니다.</div>;
                                        return workers.map(worker => {
                                            const daySchedules = scheduleData.filter(s => s.worker === worker.name && s.date === selectedDate);
                                            return (
                                                <div
                                                    key={worker.id || worker.name}
                                                    onClick={() => handleScheduleClick(worker.name, selectedDate, daySchedules[0])}
                                                    className={`rounded-xl border p-3 cursor-pointer transition-colors ${daySchedules.length > 0 ? 'bg-indigo-50 border-indigo-200 hover:bg-indigo-100' : 'bg-white border-slate-200 hover:bg-slate-50'}`}
                                                >
                                                    <div className="flex items-start justify-between gap-2">
                                                        <span className="font-bold text-sm text-slate-800 flex-shrink-0">{worker.name}</span>
                                                        {daySchedules.length === 0 && (
                                                            <span className="text-xs text-gray-300 flex items-center gap-1"><Plus size={11}/> 등록</span>
                                                        )}
                                                    </div>
                                                    {daySchedules.length > 0 && (
                                                        <div className="mt-1.5 space-y-1">
                                                            {daySchedules.map(s => (
                                                                <p key={s.id} className="text-sm text-indigo-800 whitespace-pre-wrap leading-snug">{s.content}</p>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        });
                                    })()}
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="flex-1 bg-white border rounded-xl overflow-hidden flex flex-col shadow-sm min-h-0">

                            {/* ── 데스크탑: 기존 7열 그리드 ── */}
                            <div className="hidden md:flex flex-col flex-1 min-h-0">
                                <div className="grid grid-cols-7 bg-slate-100 border-b flex-shrink-0">
                                    {weekDates.map((d, i) => {
                                        const isToday = getLocalDateString(d) === getLocalDateString(new Date());
                                        return (
                                            <div key={i} className={`p-2 text-center border-l first:border-l-0 text-xs font-bold flex flex-col ${isToday ? 'bg-indigo-50 text-indigo-700' : ''}`}>
                                                <span className={`${i===5?'text-blue-500':i===6?'text-red-500':''}`}>{['월','화','수','목','금','토','일'][i]}</span>
                                                <span className="text-[10px] text-gray-500">{d.getDate()}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="flex-1 overflow-y-auto grid grid-cols-7">
                                    {weekDates.map((d, i) => {
                                        const dateStr = getLocalDateString(d);
                                        const materials = getMaterialsForDate(dateStr);
                                        const isToday = dateStr === getLocalDateString(new Date());
                                        return (
                                            <div key={i} className={`border-l first:border-l-0 border-b p-1 min-h-[150px] ${isToday ? 'bg-indigo-50/30' : ''}`}>
                                                <div className="space-y-1">
                                                    {materials.map((m, idx) => {
                                                        const isCompleted = m.status === '회수완료';
                                                        return (
                                                            <div key={idx} className={`text-[10px] p-1.5 rounded border shadow-sm ${isCompleted ? 'bg-gray-100 text-gray-500 border-gray-200' : 'bg-white border-indigo-100'}`}>
                                                                <div className="flex justify-between mb-0.5">
                                                                    <span className={`font-bold ${isCompleted ? 'line-through' : 'text-indigo-700'}`}>{m.item}</span>
                                                                    <span className="text-gray-400">({m.quantity})</span>
                                                                </div>
                                                                <div className="truncate text-gray-500">{m.supplier}</div>
                                                                <div className={`text-[9px] mt-1 inline-block px-1 rounded ${
                                                                    m.status==='발주'?'bg-yellow-100 text-yellow-700':
                                                                    m.status==='접수'?'bg-orange-100 text-orange-700':
                                                                    m.status==='배차'?'bg-cyan-100 text-cyan-700':
                                                                    m.status==='회수대기'?'bg-red-100 text-red-700 font-bold':
                                                                    'bg-gray-200 text-gray-500'
                                                                }`}>{m.status}</div>
                                                            </div>
                                                        );
                                                    })}
                                                    {materials.length === 0 && <div className="text-[10px] text-gray-300 text-center mt-4">-</div>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

        const FormView = ({ order, onSave, onDelete, onCancel, isAdmin, currentUserId, storage }) => {
            const [data, setData] = useState(order || {
                clientName: '', itemName: '', 
                manager: '', technician: '', 
                deliveryAddress: '', 
                orderDate: new Date().toISOString().split('T')[0], 
                deliveryDate: '', 
                completedDate: '', 
                status: '설계중', description: '', clientContact: '', files: []
            });
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);

            const canEdit = !order || isAdmin || order.userId === currentUserId;

            useEffect(() => {
                if (['납품완료', '납품대기'].includes(data.status) && !data.completedDate) {
                    setData(prev => ({ ...prev, completedDate: new Date().toISOString().split('T')[0] }));
                }
            }, [data.status]);

            const handleFileChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!storage) {
                    alert("스토리지 서비스가 연결되지 않았습니다. 인터넷 상태나 권한을 확인해주세요.");
                    return;
                }

                setIsUploading(true);
                try {
                    const storagePath = `uploads/${Date.now()}_${file.name}`;
                    const storageRef = ref(storage, storagePath);
                    const snapshot = await uploadBytes(storageRef, file);
                    const downloadURL = await getDownloadURL(snapshot.ref);
                    const fullPath = snapshot.ref.fullPath;
                    const newFile = { id: Date.now(), name: file.name, url: downloadURL, fullPath: fullPath };
                    setData(prev => ({ ...prev, files: [...(prev.files || []), newFile] }));
                } catch (error) {
                    alert("파일 업로드 실패: " + error.message);
                } finally {
                    setIsUploading(false);
                    if(fileInputRef.current) fileInputRef.current.value = '';
                }
            };

            const removeFile = async (fileObj) => {
                if(!window.confirm("첨부된 파일을 영구 삭제하시겠습니까? (복구 불가)")) return;
                const { id, url, fullPath } = fileObj;
                try {
                    if (storage) {
                        let fileRef;
                        if (fullPath) fileRef = ref(storage, fullPath);
                        else if (url) fileRef = ref(storage, url);

                        if (fileRef) await deleteObject(fileRef);
                    }
                } catch (error) {
                    alert("주의: 스토리지 파일 삭제에 실패했습니다. 목록에서는 제거합니다.");
                }
                setData(prev => ({ ...prev, files: prev.files.filter(f => f.id !== id) }));
            };

            const handleSave = () => {
                if (isUploading) {
                    alert('파일 업로드 중입니다. 잠시만 기다려주세요.');
                    return;
                }
                let logInfo = null;
                if (!order) {
                    logInfo = { type: 'create', msg: `신규 작업 등록: ${data.itemName}` };
                } else if (order.status !== data.status) {
                    logInfo = { type: 'status', msg: `작업 상태 변경: ${order.status} → ${data.status}` };
                }

                onSave(data, logInfo);
            };

            if (!canEdit) return <div className="p-10 text-center">수정 권한이 없습니다.<button onClick={onCancel} className="block mx-auto mt-4 bg-gray-200 px-4 py-2 rounded">돌아가기</button></div>;

            return (
                <div className="max-w-2xl mx-auto animate-fade-in pb-10 scroll-touch">
                    <div onClick={onCancel} className="mb-4 cursor-pointer text-slate-500 font-bold">취소</div>
                    <Card className="p-6 space-y-4">
                        <h2 className="text-2xl font-bold">{order ? '수정' : '새 작업 등록'}</h2>
                        <div className="grid gap-4">
                            <div className="grid grid-cols-1 gap-1">
                                <label className="text-xs font-bold text-gray-500">작업명</label>
                                <input className="border p-2 rounded w-full" value={data.itemName} onChange={e=>setData({...data, itemName:e.target.value})}/>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-xs font-bold text-gray-500">담당자 (Manager)</label>
                                    <input className="border p-2 rounded w-full" value={data.manager} onChange={e=>setData({...data, manager:e.target.value})}/>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500">작업자 (Technician)</label>
                                    <input className="border p-2 rounded w-full" value={data.technician} onChange={e=>setData({...data, technician:e.target.value})}/>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-xs font-bold text-gray-500">클라이언트</label>
                                    <input className="border p-2 rounded w-full" value={data.clientName} onChange={e=>setData({...data, clientName:e.target.value})}/>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500">연락처</label>
                                    <input className="border p-2 rounded w-full" value={data.clientContact} onChange={e=>setData({...data, clientContact:e.target.value})}/>
                                </div>
                            </div>

                            <div>
                                <label className="text-xs font-bold text-gray-500">납품/시공 주소</label>
                                <input className="border p-2 rounded w-full" placeholder="주소를 입력하세요" value={data.deliveryAddress} onChange={e=>setData({...data, deliveryAddress:e.target.value})}/>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-xs font-bold text-gray-500">발주(접수) 날짜</label>
                                    <input type="date" className="border p-2 rounded w-full" value={data.orderDate} onChange={e=>setData({...data, orderDate:e.target.value})}/>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 text-red-500">납품(마감) 날짜</label>
                                    <input type="date" className="border p-2 rounded w-full" value={data.deliveryDate} onChange={e=>setData({...data, deliveryDate:e.target.value})}/>
                                </div>
                            </div>

                            <div>
                                <label className="text-xs font-bold text-gray-500">진행 상태</label>
                                <select className="border p-2 rounded w-full" value={data.status} onChange={e=>setData({...data, status:e.target.value})}>
                                    <option>설계중</option>
                                    <option>자재발주중</option>
                                    <option>작업중</option>
                                    <option>작업완료</option>
                                    <option>도장/마감중</option>
                                    <option>납품대기</option>
                                    <option>납품완료</option>
                                </select>
                            </div>

                            {['작업완료', '납품완료', '납품대기'].includes(data.status) && (
                                <div>
                                    <label className="text-xs font-bold text-gray-500 text-blue-600">실제 완료일 (시공/납품 완료)</label>
                                    <input type="date" className="border p-2 rounded w-full bg-blue-50 border-blue-200" value={data.completedDate || ''} onChange={e=>setData({...data, completedDate:e.target.value})}/>
                                </div>
                            )}

                            <div>
                                <div className="flex justify-between mb-1">
                                    <label className="text-xs font-bold text-gray-500">작업 내용 / 메모</label>
                                </div>
                                <textarea className="border p-2 rounded w-full h-24" value={data.description} onChange={e=>setData({...data, description:e.target.value})}/>
                            </div>

                            <div className="border-t pt-4 mt-2">
                                <label className="text-xs font-bold text-gray-500 mb-2 block">도면 / 파일 첨부</label>
                                <div className="space-y-2">
                                {(data.files || []).map(f => (
                                    <div key={f.id} className="flex justify-between items-center p-2 bg-slate-50 rounded border text-sm">
                                    <div className="flex items-center gap-2 truncate">
                                        <Paperclip size={14} className="text-gray-400"/>
                                        <span className="truncate">{f.name}</span>
                                    </div>
                                    <button onClick={() => removeFile(f)} className="text-red-500 hover:text-red-700"><X size={14}/></button>
                                    </div>
                                ))}
                                </div>
                                
                                {isUploading && (
                                    <div className="text-center py-2 flex items-center justify-center gap-2 text-sm text-indigo-600 font-bold">
                                        <div className="loader"></div> 업로드 중...
                                    </div>
                                )}

                                <div className="mt-2 flex items-center gap-2">
                                    <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileChange} />
                                    <button onClick={() => !isUploading && fileInputRef.current.click()} disabled={isUploading} className="text-sm bg-gray-100 border border-gray-300 px-3 py-1.5 rounded flex items-center gap-2 hover:bg-gray-200 disabled:opacity-50">
                                        <UploadCloud size={14}/> {isUploading ? '업로드 중' : '파일 업로드'}
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div className="flex justify-end gap-2 pt-4 border-t">
                            {order && <button onClick={()=>onDelete(order.id)} className="text-red-500 text-sm font-bold px-4">삭제</button>}
                            <button onClick={handleSave} disabled={isUploading} className="bg-slate-800 text-white px-6 py-2 rounded font-bold disabled:bg-gray-400">
                                {isUploading ? '처리중...' : '저장'}
                            </button>
                        </div>
                    </Card>
                </div>
            );
        };

        const MaterialManageView = ({ suppliers, orders, onUpdateOrder, onMaterialStatusClick }) => {
            const [selectedSupplier, setSelectedSupplier] = useState(null);
            const [isCustomMode, setIsCustomMode] = useState(false);
            const [editingMaterial, setEditingMaterial] = useState(null);
            const [isEditingInfo, setIsEditingInfo] = useState(false);
            const [editingInfoData, setEditingInfoData] = useState({ phone: '', email: '', address: '' });
            const baseInfo = BASE_SUPPLIER_INFO[selectedSupplier];
            const [quickAdd, setQuickAdd] = useState(false);
            const [batchHeader, setBatchHeader] = useState({ orderId: '', supplier: '', date: new Date().toISOString().split('T')[0] });
            const [batchItems, setBatchItems] = useState([{ id: Date.now(), item: '', quantity: '' }]);
            const [quickAddType, setQuickAddType] = useState('발주');
            const [newSupplierInfo, setNewSupplierInfo] = useState({ phone: '', email: '', address: '' });

            useEffect(() => { 
                if (selectedSupplier && !isCustomMode) {
                    setBatchHeader(prev => ({ ...prev, supplier: selectedSupplier }));
                } else if (isCustomMode) {
                    setBatchHeader(prev => ({ ...prev, supplier: '' }));
                }
            }, [selectedSupplier, isCustomMode]);

            const displayedMaterials = useMemo(() => {
                const all = [];
                orders.forEach(o => { (o.materials || []).forEach(m => { all.push({ ...m, orderId: o.id, orderName: o.itemName }); }); });
                const sorted = all.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));

                let list = (selectedSupplier && !isCustomMode) 
                    ? (suppliers[selectedSupplier] || [])
                    : sorted;
                
                const twelveHoursAgo = new Date(Date.now() - 12 * 60 * 60 * 1000);
                
                return list.filter(m => {
                    if (m.status === '정보') return false;
                    // 회수완료이고 완료시간이 존재하며 12시간이 지났으면 숨김
                    if (m.status === '회수완료' && m.completedAt) {
                        const completedDate = new Date(m.completedAt);
                        if (completedDate < twelveHoursAgo) return false;
                    }
                    return true;
                });
            }, [orders, suppliers, selectedSupplier, isCustomMode]);

            const currentSupplierInfo = useMemo(() => {
                if (baseInfo) return baseInfo;
                if (selectedSupplier && suppliers[selectedSupplier]) {
                    const infoItem = suppliers[selectedSupplier].find(m => m.status === '정보') || suppliers[selectedSupplier][0];
                    return infoItem?.supplierInfo || {};
                }
                return {};
            }, [selectedSupplier, suppliers, baseInfo]);

            useEffect(() => {
                if (selectedSupplier && !isCustomMode) {
                    setEditingInfoData({ phone: currentSupplierInfo.phone || '', email: currentSupplierInfo.email || '', address: currentSupplierInfo.address || '' });
                    setIsEditingInfo(false);
                }
            }, [selectedSupplier, currentSupplierInfo, isCustomMode]);

            const sortedSuppliers = useMemo(() => {
                const list = Object.keys(suppliers).map(name => {
                    const items = suppliers[name];
                    const hasActive = items.some(m => ['발주', '접수', '회수대기', '작업중', '배차'].includes(m.status));
                    const pickupCnt = items.filter(m => m.status === '회수대기').length;
                    const activeCnt = items.filter(m => ['발주', '접수', '배차'].includes(m.status)).length;
                    return { name, hasActive, pickupCnt, activeCnt, items };
                });
                return list.sort((a, b) => {
                    if (a.hasActive && !b.hasActive) return -1;
                    if (!a.hasActive && b.hasActive) return 1;
                    return a.name.localeCompare(b.name, 'ko');
                });
            }, [suppliers]);

            const addRow = () => setBatchItems([...batchItems, { id: Date.now() + Math.random(), item: '', quantity: '' }]);
            const removeRow = (id) => batchItems.length === 1 ? setBatchItems([{ id: Date.now(), item: '', quantity: '' }]) : setBatchItems(batchItems.filter(i => i.id !== id));
            const updateRow = (id, field, value) => setBatchItems(batchItems.map(i => i.id === id ? { ...i, [field]: value } : i));

            const handleBatchAdd = async () => {
                const validItems = batchItems.filter(i => i.item.trim() !== '');
                if (validItems.length === 0 && !isCustomMode) return alert("품목을 최소 1개 이상 입력하세요");
                if (isCustomMode && !batchHeader.supplier) return alert("거래처명을 입력하세요.");
                
                let targetOrder = orders.find(o => o.id === batchHeader.orderId);
                if (!targetOrder && !batchHeader.orderId) {
                    targetOrder = orders.find(o => o.itemName === '기타 자재 발주' && !['납품완료'].includes(o.status));
                    if (!targetOrder) targetOrder = { id: `mock-misc-${Date.now()}`, itemName: '기타 자재 발주', clientName: '내부', status: '작업중', orderDate: new Date().toISOString().split('T')[0], deliveryDate: '', materials: [] };
                }

                const finalSupplier = isCustomMode ? batchHeader.supplier : selectedSupplier;
                const isInfoRegistration = isCustomMode && validItems.length === 0;
                const newMaterials = [];

                if (isInfoRegistration) {
                    newMaterials.push({ id: Date.now(), supplier: finalSupplier, item: "거래처 정보", quantity: "-", status: "정보", date: batchHeader.date, supplierInfo: { ...newSupplierInfo, ...getMockCoordinates(newSupplierInfo.address) } });
                } else {
                    validItems.forEach((itemData, index) => {
                        const materialData = { id: Date.now() + index, supplier: finalSupplier, item: itemData.item, quantity: itemData.quantity, status: quickAddType, date: batchHeader.date };
                        if (isCustomMode && index === 0) materialData.supplierInfo = { ...newSupplierInfo, ...getMockCoordinates(newSupplierInfo.address) };
                        newMaterials.push(materialData);
                    });
                }

                const updatedMaterials = [...(targetOrder.materials || []), ...newMaterials];
                await onUpdateOrder({ ...targetOrder, materials: updatedMaterials }, isInfoRegistration ? null : { type: 'material', msg: `${quickAddType} 일괄 등록 (${validItems.length}건) - ${finalSupplier}` });
                setQuickAdd(false); setBatchItems([{ id: Date.now(), item: '', quantity: '' }]); setNewSupplierInfo({ phone: '', email: '', address: '' });
                if(isCustomMode) setSelectedSupplier(null); 
            };
            
            const handleDelete = async (m) => {
                if(!window.confirm(`${m.item} 항목을 정말 삭제하시겠습니까?`)) return;
                const order = orders.find(o => o.id === m.orderId);
                if(order) {
                    const updated = order.materials.filter(x => x.id !== m.id);
                    await onUpdateOrder({ ...order, materials: updated }, {type: 'material', msg: `자재 삭제: ${m.item}`});
                }
            };

            const toggleStatus = async (m) => {
                if (m.status === '정보') return;
                onMaterialStatusClick(m, m.status);
            };

            const handleEditSave = async () => {
                if (!editingMaterial) return;
                const order = orders.find(o => o.id === editingMaterial.orderId);
                if (order) {
                    // 기존 자재 배열에서 수정할 자재를 찾아 업데이트
                    const updatedMaterials = (order.materials || []).map(m => 
                        m.id === editingMaterial.id ? { ...m, item: editingMaterial.item, quantity: editingMaterial.quantity, supplier: editingMaterial.supplier } : m
                    );
                    await onUpdateOrder({ ...order, materials: updatedMaterials }, { type: 'material', msg: `자재 수정: ${editingMaterial.item}` });
                    setEditingMaterial(null);
                }
            };

            return (
                <div className="flex h-full gap-4 animate-fade-in flex-col md:flex-row overflow-hidden relative">
                    <div className="w-full md:w-1/3 overflow-y-auto space-y-2 pr-0 md:pr-2 max-h-[200px] md:max-h-full flex-shrink-0 scroll-touch">
                        <div onClick={() => { setIsCustomMode(true); setSelectedSupplier(null); setBatchHeader(prev=>({...prev, supplier: ''})); }} className={`p-3 border rounded-lg cursor-pointer transition-all flex items-center gap-2 ${isCustomMode ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white hover:bg-slate-50'}`}>
                        <Plus size={16} /> <span className="font-bold">직접 입력 (새 거래처)</span>
                        </div>
                        <div onClick={() => { setSelectedSupplier(null); setIsCustomMode(false); }} className={`p-3 border rounded-lg cursor-pointer transition-all flex items-center gap-2 ${!selectedSupplier && !isCustomMode ? 'bg-slate-800 text-white shadow-lg' : 'bg-white hover:bg-slate-50'}`}>
                            <FileText size={16} /> <span className="font-bold">전체 보기</span>
                        </div>
                        {sortedSuppliers.map(s => (
                            <div key={s.name} onClick={() => { setSelectedSupplier(s.name); setIsCustomMode(false); }} className={`p-3 border rounded-lg cursor-pointer transition-all ${selectedSupplier === s.name && !isCustomMode ? 'bg-slate-800 text-white shadow-lg' : 'bg-white hover:bg-slate-50'}`}>
                                <div className="flex justify-between items-center mb-1"><span className="font-bold">{s.name}</span>{s.pickupCnt > 0 && <span className="bg-indigo-500 text-white text-[10px] px-1.5 py-0.5 rounded font-bold animate-pulse">회수 {s.pickupCnt}</span>}</div>
                                <div className="text-xs opacity-70">진행중 {s.activeCnt}건 / 총 {s.items.length}건</div>
                            </div>
                        ))}
                    </div>
                    <div className="w-full md:w-2/3 bg-white border rounded-xl p-4 md:p-6 flex flex-col overflow-hidden">
                        <div className="mb-4 pb-4 border-b flex-shrink-0 flex justify-between">
                            {isCustomMode ? <input className="text-2xl font-bold border-b border-gray-300 focus:border-indigo-500 outline-none w-full" placeholder="거래처명 입력" value={batchHeader.supplier} onChange={e => setBatchHeader({...batchHeader, supplier: e.target.value})}/> : <h2 className="text-2xl font-bold truncate">{selectedSupplier || "전체 발주 내역"}</h2>}
                            <button onClick={() => setQuickAdd(!quickAdd)} className="bg-indigo-600 text-white px-3 py-1.5 rounded text-sm font-bold flex items-center gap-1 flex-shrink-0 ml-2"><Plus size={14} /> 자재 등록</button>
                        </div>
                        {(quickAdd || isCustomMode) && (
                            <div className="mb-4 p-3 bg-indigo-50 rounded border border-indigo-100 animate-fade-in flex-shrink-0">
                                <div className="flex gap-2 mb-2">
                                    <input type="date" className="border p-2 rounded text-sm w-1/3 min-w-[120px]" value={batchHeader.date} onChange={e => setBatchHeader({ ...batchHeader, date: e.target.value })} />
                                    <select className="border p-2 rounded flex-1 text-sm min-w-0" value={batchHeader.orderId} onChange={e => setBatchHeader({ ...batchHeader, orderId: e.target.value })}>
                                        <option value="">프로젝트 선택 (없으면 기타)</option>
                                        {orders.filter(o => !['납품완료'].includes(o.status)).map(o => <option key={o.id} value={o.id}>{o.itemName}</option>)}
                                    </select>
                                </div>
                                {isCustomMode && (
                                    <div className="mb-2 space-y-2 p-2 bg-white rounded border border-indigo-100">
                                        <div className="text-xs font-bold text-indigo-900">신규 거래처 정보 (회수 동선에 사용됨)</div>
                                        <div className="flex gap-2">
                                            <input placeholder="전화번호" className="border p-2 rounded flex-1 text-sm" value={newSupplierInfo.phone} onChange={e => setNewSupplierInfo({...newSupplierInfo, phone: e.target.value})} />
                                            <input placeholder="이메일" className="border p-2 rounded flex-1 text-sm" value={newSupplierInfo.email} onChange={e => setNewSupplierInfo({...newSupplierInfo, email: e.target.value})} />
                                        </div>
                                        <input placeholder="주소 (네이버 지도 연동)" className="border p-2 rounded w-full text-sm" value={newSupplierInfo.address} onChange={e => setNewSupplierInfo({...newSupplierInfo, address: e.target.value})} />
                                    </div>
                                )}
                                <div className="flex gap-4 text-sm p-1 mb-2">
                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="quickAddType" checked={quickAddType === '발주'} onChange={()=>setQuickAddType('발주')}/> <span>구매 (발주)</span></label>
                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="quickAddType" checked={quickAddType === '접수'} onChange={()=>setQuickAddType('접수')}/> <span>가공 (접수)</span></label>
                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="quickAddType" checked={quickAddType === '배차'} onChange={()=>setQuickAddType('배차')}/> <span>배차</span></label>
                                </div>
                                {batchItems.map((row, index) => (
                                    <div key={row.id} className="flex gap-2 items-center mb-2">
                                        <input placeholder="품목명" className="border p-2 rounded flex-1 text-sm" value={row.item} onChange={e => updateRow(row.id, 'item', e.target.value)} />
                                        <input placeholder="수량" className="border p-2 rounded w-20 text-sm" value={row.quantity} onChange={e => updateRow(row.id, 'quantity', e.target.value)} />
                                        <button onClick={() => removeRow(row.id)} className="text-gray-400 hover:text-red-500"><X size={18} /></button>
                                    </div>
                                ))}
                                <button onClick={addRow} className="text-xs text-indigo-600 font-bold flex items-center gap-1 hover:underline mt-1 mb-2"><Plus size={14}/> 품목 추가하기</button>
                                <button onClick={handleBatchAdd} className="w-full bg-indigo-600 text-white py-2 rounded font-bold text-sm">등록</button>
                            </div>
                        )}
                        <div className="flex-1 overflow-y-auto scroll-touch">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-slate-50 border-b sticky top-0"><tr><th className="p-2 w-16">상태</th>{!selectedSupplier && <th className="p-2 w-20">거래처</th>}<th className="p-2">품목/수량</th><th className="p-2 text-right w-16">관리</th></tr></thead>
                                <tbody>
                                    {displayedMaterials.map((m, i) => (
                                        <tr key={i} className="border-b hover:bg-slate-50 group">
                                            <td className="p-2 align-top pt-3"><MaterialStatusBadge status={m.status} onClick={() => toggleStatus(m)} /></td>
                                            {!selectedSupplier && <td className="p-2 align-top pt-3 font-bold text-slate-700 text-xs break-words">{m.supplier}</td>}
                                            <td className="p-2">
                                                <div className="text-[10px] text-gray-400 mb-0.5">{m.date}</div>
                                                <div className="font-bold text-slate-700">{m.item}</div>
                                                <div className="text-xs text-gray-500">{m.quantity}</div>
                                                <div className="text-[10px] text-indigo-500 mt-0.5">{m.orderName}</div>
                                            </td>
                                            <td className="p-2 text-right align-top pt-2 flex justify-end gap-1">
                                                <button onClick={()=>setEditingMaterial({...m})} className="p-1.5 hover:bg-blue-100 text-blue-600 rounded opacity-0 group-hover:opacity-100 transition-opacity"><Edit3 size={14}/></button>
                                                <button onClick={()=>handleDelete(m)} className="p-1.5 hover:bg-red-100 text-red-600 rounded opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={14}/></button>
                                            </td>
                                        </tr>
                                    ))}
                                    {displayedMaterials.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-gray-400">내역이 없습니다.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {editingMaterial && (
                        <ModalOverlay onClose={() => setEditingMaterial(null)}>
                            <div className="bg-white w-full max-w-sm rounded-xl p-6 shadow-2xl animate-fade-in" onClick={e=>e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-lg">자재 내용 수정</h3>
                                    <button onClick={()=>setEditingMaterial(null)}><X size={20}/></button>
                                </div>
                                <div className="space-y-3 mb-4">
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 block mb-1">거래처</label>
                                        <input className="border p-2 rounded w-full text-sm" value={editingMaterial.supplier} onChange={e => setEditingMaterial({ ...editingMaterial, supplier: e.target.value })} />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 block mb-1">품목명</label>
                                        <input className="border p-2 rounded w-full text-sm" value={editingMaterial.item} onChange={e => setEditingMaterial({ ...editingMaterial, item: e.target.value })} />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 block mb-1">수량</label>
                                        <input className="border p-2 rounded w-full text-sm" value={editingMaterial.quantity} onChange={e => setEditingMaterial({ ...editingMaterial, quantity: e.target.value })} />
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setEditingMaterial(null)} className="flex-1 bg-gray-100 py-3 rounded-xl font-bold text-gray-600">취소</button>
                                    <button onClick={handleEditSave} className="flex-1 bg-indigo-600 py-3 rounded-xl font-bold text-white shadow-lg">저장</button>
                                </div>
                            </div>
                        </ModalOverlay>
                    )}
                </div>
            );
        };

        const ChecklistView = ({ orders, onNavigate, onSaveChecklist, checklistData }) => {
            const [selectedOrderId, setSelectedOrderId] = useState(null);
            
            // 납품완료 전 단계의 모든 작업
            const activeOrders = orders.filter(o => 
                o.status !== '납품완료' && o.itemName !== '기타 자재 발주'
            ).sort((a, b) => {
                if (!a.deliveryDate) return 1;
                if (!b.deliveryDate) return -1;
                return new Date(a.deliveryDate) - new Date(b.deliveryDate);
            });

            const selectedOrder = activeOrders.find(o => o.id === selectedOrderId) || activeOrders[0];

            // 선택된 작업의 체크리스트 항목들
            const getChecklist = (orderId) => {
                return checklistData[orderId] || [];
            };

            const toggleCheckItem = (orderId, itemIndex) => {
                const current = getChecklist(orderId);
                const updated = current.map((item, i) => 
                    i === itemIndex ? { ...item, checked: !item.checked } : item
                );
                onSaveChecklist(orderId, updated);
            };

            const addCheckItem = (orderId, text) => {
                if (!text.trim()) return;
                const current = getChecklist(orderId);
                const updated = [...current, { text: text.trim(), checked: false, id: Date.now().toString() }];
                onSaveChecklist(orderId, updated);
            };

            const deleteCheckItem = (orderId, itemIndex) => {
                const current = getChecklist(orderId);
                const updated = current.filter((_, i) => i !== itemIndex);
                onSaveChecklist(orderId, updated);
            };

            const editCheckItem = (orderId, itemIndex, newText) => {
                if (!newText.trim()) return;
                const current = getChecklist(orderId);
                const updated = current.map((item, i) =>
                    i === itemIndex ? { ...item, text: newText.trim() } : item
                );
                onSaveChecklist(orderId, updated);
            };

            // 위클리 캘린더
            const getWeekDates = () => {
                const today = new Date();
                const day = today.getDay();
                const diff = today.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(today);
                monday.setDate(diff);
                const week = [];
                for (let i = 0; i < 7; i++) {
                    const d = new Date(monday);
                    d.setDate(monday.getDate() + i);
                    week.push(d);
                }
                return week;
            };

            const weekDates = getWeekDates();
            const getLocalDateString = (d) => {
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const da = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${da}`;
            };

            const getOrdersForDate = (dateStr) => {
                return activeOrders.filter(o => o.deliveryDate === dateStr);
            };

            const todayStr = getLocalDateString(new Date());

            const [newItemText, setNewItemText] = useState('');
            const [editingItemIndex, setEditingItemIndex] = useState(null);
            const [editingItemText, setEditingItemText] = useState('');
            const inputRef = useRef(null);
            const editInputRef = useRef(null);

            const handleAddItem = () => {
                if (selectedOrder && newItemText.trim()) {
                    addCheckItem(selectedOrder.id, newItemText);
                    setNewItemText('');
                    inputRef.current?.focus();
                }
            };

            const handleEditStart = (idx, text) => {
                setEditingItemIndex(idx);
                setEditingItemText(text);
                setTimeout(() => editInputRef.current?.focus(), 50);
            };

            const handleEditSave = () => {
                if (selectedOrder && editingItemIndex !== null) {
                    editCheckItem(selectedOrder.id, editingItemIndex, editingItemText);
                }
                setEditingItemIndex(null);
                setEditingItemText('');
            };

            const checklist = selectedOrder ? getChecklist(selectedOrder.id) : [];
            const checkedCount = checklist.filter(i => i.checked).length;
            // 미체크 항목 먼저, 체크된 항목은 하단으로
            const sortedChecklist = [
                ...checklist.map((item, idx) => ({ ...item, _origIdx: idx })).filter(i => !i.checked),
                ...checklist.map((item, idx) => ({ ...item, _origIdx: idx })).filter(i => i.checked),
            ];

            return (
                <div className="animate-fade-in flex flex-col gap-4 pb-10">
                    {/* 위클리 달력 */}
                    <div className="bg-white rounded-xl border shadow-sm overflow-hidden">
                        <div className="grid grid-cols-7">
                            {weekDates.map((d, i) => {
                                const dateStr = getLocalDateString(d);
                                const isToday = dateStr === todayStr;
                                const dayOrders = getOrdersForDate(dateStr);
                                return (
                                    <div key={i} className={`border-l first:border-l-0 p-2 min-h-[80px] ${isToday ? 'bg-indigo-50' : ''}`}>
                                        <div className="text-center mb-1">
                                            <div className={`text-[10px] font-bold ${i===5?'text-blue-500':i===6?'text-red-500':isToday?'text-indigo-700':'text-slate-500'}`}>
                                                {['월','화','수','목','금','토','일'][i]}
                                            </div>
                                            <div className={`text-sm font-bold ${isToday?'bg-indigo-600 text-white rounded-full w-6 h-6 flex items-center justify-center mx-auto':'text-slate-700'}`}>
                                                {d.getDate()}
                                            </div>
                                        </div>
                                        <div className="space-y-1">
                                            {dayOrders.map((o, idx) => (
                                                <button 
                                                    key={idx} 
                                                    onClick={() => setSelectedOrderId(o.id)}
                                                    className={`w-full text-left text-[9px] px-1 py-0.5 rounded truncate font-bold transition-colors ${selectedOrder?.id === o.id ? 'bg-indigo-600 text-white' : 'bg-red-100 text-red-700 hover:bg-red-200'}`}
                                                    title={o.itemName}
                                                >
                                                    {o.itemName}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* 모바일: 가로 스크롤 작업 칩 선택 */}
                    <div className="md:hidden">
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                            {activeOrders.length === 0 && (
                                <span className="text-sm text-gray-400 px-1">진행중인 작업 없음</span>
                            )}
                            {activeOrders.map(o => {
                                const cl = getChecklist(o.id);
                                const checked = cl.filter(i => i.checked).length;
                                const isSelected = selectedOrder?.id === o.id;
                                return (
                                    <button
                                        key={o.id}
                                        onClick={() => setSelectedOrderId(o.id)}
                                        className={`flex-shrink-0 px-3 py-2 rounded-xl border text-xs font-bold transition-colors text-left ${isSelected ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-700 border-slate-200 hover:border-indigo-400'}`}
                                    >
                                        <div className="truncate max-w-[120px]">{o.itemName}</div>
                                        {cl.length > 0 && (
                                            <div className={`text-[10px] mt-0.5 font-normal ${isSelected ? 'text-slate-300' : checked === cl.length ? 'text-green-500' : 'text-gray-400'}`}>
                                                {checked}/{cl.length} 완료
                                            </div>
                                        )}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {/* 본문: 좌측 목록(데스크탑) + 체크리스트 */}
                    <div className="flex gap-4 min-h-[400px]">
                        {/* 좌측: 진행중 작업 목록 — 데스크탑만 표시 */}
                        <div className="hidden md:flex w-56 flex-shrink-0 bg-white rounded-xl border shadow-sm overflow-hidden flex-col">
                            <div className="p-3 bg-slate-800 text-white text-sm font-bold">
                                진행중 ({activeOrders.length})
                            </div>
                            <div className="flex-1 overflow-y-auto no-scrollbar">
                                {activeOrders.length === 0 && (
                                    <div className="p-4 text-sm text-gray-400 text-center">진행중인 작업 없음</div>
                                )}
                                {activeOrders.map(o => {
                                    const cl = getChecklist(o.id);
                                    const checked = cl.filter(i => i.checked).length;
                                    const isSelected = (selectedOrder?.id === o.id);
                                    return (
                                        <button
